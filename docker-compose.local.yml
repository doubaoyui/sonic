services:
  sonic:
    build:
      context: .
      dockerfile: Dockerfile
    image: sonic-enterprise:local
    ports:
      - "${SONIC_BIND_IP:-127.0.0.1}:${SONIC_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    restart: unless-stopped
    command: ["/bin/sh","-c","/app/docker_init.sh && exec /app/sonic -config /app/conf/config.docker.yaml"]
